<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e8" />
      <stop offset="100%" stop-color="#e0d6c8" />
    </linearGradient>

    <filter id="frameShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.2" />
    </filter>

    <linearGradient id="redBlock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4444" />
      <stop offset="100%" stop-color="#cc0000" />
    </linearGradient>
    <linearGradient id="blueBlock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4488ff" />
      <stop offset="100%" stop-color="#0044cc" />
    </linearGradient>
    <linearGradient id="yellowBlock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffdd44" />
      <stop offset="100%" stop-color="#cc9900" />
    </linearGradient>
    <linearGradient id="cyanBlock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#44ddff" />
      <stop offset="100%" stop-color="#0099cc" />
    </linearGradient>
    <linearGradient id="purpleBlock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aa66ff" />
      <stop offset="100%" stop-color="#6600cc" />
    </linearGradient>

    <filter id="blockGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGradient)" />

